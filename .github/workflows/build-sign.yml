# =============================================================================
# Workflow 1: Build, Push e Assinatura com Cosign (keyless via OIDC)
# Trigger: push na branch main
# =============================================================================
name: Build, Push e Sign

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-sign:
    name: Build, Push e Assinar Imagem
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write      # push para GHCR
      id-token: write      # necessário para keyless signing (OIDC)
      attestations: write


    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-ref:    ${{ steps.build.outputs.image-ref }}

    steps:
      # ------------------------------------------------------------------
      # 1. Checkout do repositório
      # ------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 2. Configurar Docker Buildx (builder multi-plataforma)
      # ------------------------------------------------------------------
      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ------------------------------------------------------------------
      # 3. Autenticar no GitHub Container Registry
      # ------------------------------------------------------------------
      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ------------------------------------------------------------------
      # 4. Extrair metadados (tags e labels) para a imagem
      # ------------------------------------------------------------------
      - name: Extrair metadados da imagem
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      # ------------------------------------------------------------------
      # 5. Build e push da imagem Docker
      # ------------------------------------------------------------------
      - name: Build e Push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags:   ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=1.0.${{ github.run_number }}
            BUILD_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      # ------------------------------------------------------------------
      # 6. Instalar Cosign
      # ------------------------------------------------------------------
      - name: Instalar Cosign
        uses: sigstore/cosign-installer@v3

      # ------------------------------------------------------------------
      # 7. Assinar a imagem com Cosign (keyless via OIDC do GitHub Actions)
      #    A assinatura é registrada automaticamente no Rekor (log público)
      # ------------------------------------------------------------------
      - name: Assinar imagem com Cosign (keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          IMAGE_REF="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}"
          echo "Assinando imagem: $IMAGE_REF"

          cosign sign --yes "$IMAGE_REF"

          echo "image-ref=$IMAGE_REF" >> $GITHUB_OUTPUT
          echo "Assinatura concluída e registrada no Rekor."

      # ------------------------------------------------------------------
      # 8. Gerar arquivo de proveniência (evidência do build)
      # ------------------------------------------------------------------
      - name: Gerar proveniência
        run: |
          cat > provenance.json << PROVEOF
          {
            "buildType":   "https://github.com/actions/runner",
            "builder":     "${{ runner.os }}",
            "buildConfig": {
              "workflow":   "${{ github.workflow }}",
              "ref":        "${{ github.ref }}",
              "sha":        "${{ github.sha }}",
              "runId":      "${{ github.run_id }}",
              "runNumber":  "${{ github.run_number }}"
            },
            "subject": {
              "name":   "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}",
              "digest": "${{ steps.build.outputs.digest }}"
            },
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          PROVEOF
          echo "Proveniência gerada:"
          cat provenance.json

      # ------------------------------------------------------------------
      # 9. Publicar artefatos do workflow
      # ------------------------------------------------------------------
      - name: Publicar proveniência como artefato
        uses: actions/upload-artifact@v4
        with:
          name: provenance
          path: provenance.json

      # ------------------------------------------------------------------
      # 10. Sumário no GitHub
      # ------------------------------------------------------------------
      - name: Sumário do build
        run: |
          echo "## Resultado do Build e Assinatura" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Imagem | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Digest | \`${{ steps.build.outputs.digest }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit SHA | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Assinatura | Keyless via OIDC GitHub Actions |" >> $GITHUB_STEP_SUMMARY
          echo "| Log público | https://search.sigstore.dev |" >> $GITHUB_STEP_SUMMARY
